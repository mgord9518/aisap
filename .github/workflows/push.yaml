name: Automatic build

on:
  push:
    branches: [ testing ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Grab Go shImg
      run: |
        mkdir -p ~/.local/bin
        wget -O ~/.local/bin/go $(curl -q https://api.github.com/repos/mgord9518/go.AppImage/releases | grep $(uname -m) | grep Go | grep shImg | grep browser_download_url | cut -d'"' -f4 | head -n1)
        chmod +x ~/.local/bin/go

    - name: Install deps
      run: |
        ./resources/install_deps.sh
        curl -s https://raw.githubusercontent.com/89luca89/distrobox/main/install | sudo sh
        distrobox create --name alpine --image alpine:3.16 --yes
        distrobox enter alpine -- sudo apk add autoconf git gcc automake make cmake meson libcap-dev libcap-static libc-dev go fuse fuse3 file appstream squashfs-tools

    - name: Build
      run: distrobox enter alpine -- ./resources/build.sh

    - name: Test build
      run: ./resources/test.sh

    - name: Upload build
      uses: "marvinpinto/action-automatic-releases@latest"
      with:
        repo_token: "${{ secrets.GITHUB_TOKEN }}"
        automatic_release_tag: "testing"
        prerelease: true
        title: "Test branch"
        files: |
          *.AppImage
          *.shImg
          *.zsync
          profile_database.json
